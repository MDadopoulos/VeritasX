[pytest]
markers =
    integration: marks tests as requiring live Vertex AI credentials (deselect with -m "not integration")

testpaths = tests
addopts = -v --tb=short -m "not integration" -p no:anyio -p no:asyncio -p no:benchmark -p no:codspeed -p no:recording -p no:socket -p no:syrupy -p no:langsmith
